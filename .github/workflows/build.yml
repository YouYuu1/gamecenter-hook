name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git ccache libostree-dev

      - name: Manual Theos Setup
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          git clone https://github.com/theos/sdks.git ~/theos/sdks-master
          mv ~/theos/sdks-master/*.sdk ~/theos/sdks/
          rm -rf ~/theos/sdks-master

      - name: Build Tweak Package
        run: |
          export THEOS=~/theos
          
          # Automatyczne generowanie plików filtra przed kompilacją
          cat <<EOF > Filter.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.apple.gamecenter</string>
                  </array>
              </dict>
          </dict>
          </plist>
          EOF
          
          cp Filter.plist GameCenterHook.plist

          # Kompilacja projektu
          make package FINALPACKAGE=1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Files
          path: |
            packages/*.deb
            .theos/obj/GameCenterHook.dylib
