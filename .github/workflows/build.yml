name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git ccache libostree-dev rsync curl

      - name: Official Theos Linux Setup
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Build Tweak Package
        run: |
          export THEOS=~/theos
          
          # Generowanie plików filtra środowiska MobileLoader
          cat <<EOF > Filter.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.apple.gamecenter</string>
                  </array>
              </dict>
          </dict>
          </plist>
          EOF
          
          cp Filter.plist GameCenterHook.plist

          # Uruchomienie kompilacji
          make package FINALPACKAGE=1

          # POPRAWKA NAGŁÓWKA ZA POMOCĄ TOOLCHAINA THEOSA
          # Używamy oficjalnego install_name_tool dostarczonego razem z toolchainem w ~/theos
          if [ -f .theos/obj/arm64/GameCenterHook.dylib ]; then
            ~/theos/toolchain/linux/iphone/bin/install_name_tool -id "@rpath/GameCenterHook.dylib" .theos/obj/arm64/GameCenterHook.dylib
            # Kopiujemy gotowy, podmieniony plik wyżej dla wygody
            cp .theos/obj/arm64/GameCenterHook.dylib .theos/obj/GameCenterHook.dylib
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Files
          path: |
            packages/*.deb
            .theos/obj/**/*.dylib
