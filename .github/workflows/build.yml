name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git ccache libostree-dev rsync

      - name: Manual Theos Setup
        run: |
          # 1. Klunujemy główne repozytorium Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # 2. Pobieramy oficjalny Toolchain dla Linuksa (kompilator iOS)
          mkdir -p ~/theos/toolchain/linux/iphone
          curl -LO https://github.com/theos/toolchain/releases/download/linux-arm64/toolchain-linux-arm64.tar.gz || curl -LO https://github.com/theos/toolchain/releases/download/v2/toolchain-linux-x86_64.tar.gz
          # W zależności od maszyny wyciągamy paczkę do odpowiedniego folderu
          tar -xf toolchain-linux-*.tar.gz -C ~/theos/toolchain/linux/iphone --strip-components=1 || tar -xf toolchain-linux-x86_64.tar.gz -C ~/theos/toolchain/linux/iphone --strip-components=1
          rm -f toolchain-linux-*.tar.gz
          
          # 3. Pobieramy oficjalne SDK (iOS 14)
          git clone https://github.com/theos/sdks.git ~/theos/sdks-master
          mv ~/theos/sdks-master/*.sdk ~/theos/sdks/
          rm -rf ~/theos/sdks-master

      - name: Build Tweak Package
        run: |
          export THEOS=~/theos
          
          # Generowanie plików filtra środowiska MobileLoader
          cat <<EOF > Filter.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.apple.gamecenter</string>
                  </array>
              </dict>
          </dict>
          </plist>
          EOF
          
          cp Filter.plist GameCenterHook.plist

          # Uruchomienie kompilacji z nowym Toolchainem
          make package FINALPACKAGE=1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Files
          path: |
            packages/*.deb
            .theos/obj/GameCenterHook.dylib
